<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div class="cals-text">
        <p id="user-input">0</p>
    </div>

    <div class="cals-keys">

        <!-- Row 1 -->
        <button class="key-others operations">^</button>
        <button class="key-others operations">√</button>
        <button class="key-others operations">(</button>
        <button class="key-others operations">)</button>

        <!-- Row 2 -->
        <button class="key-others operations">AC</button>
        <button class="key-others operations">Del</button>
        <button class="key-others operations">%</button>
        <button class="key-operate operations">/</button>

        <!-- Row 3 -->
        <button class="key-numbers">7</button>
        <button class="key-numbers">8</button>
        <button class="key-numbers">9</button>
        <button class="key-operate operations">*</button>

        <!-- Row 4 -->
        <button class="key-numbers">4</button>
        <button class="key-numbers">5</button>
        <button class="key-numbers">6</button>
        <button class="key-operate operations">-</button>

        <!-- Row 5 -->
        <button class="key-numbers">1</button>
        <button class="key-numbers">2</button>
        <button class="key-numbers">3</button>
        <button class="key-operate operations">+</button>

        <!-- Row 6 -->
        <button class="key-others operations">π</button>
        <button class="key-zero key-numbers">0</button>
        <button class="key-numbers">.</button>
        <button class="key-operate operations">=</button>

    </div>
</div>

</body>
<script src="script.js"></script> 
</html>
